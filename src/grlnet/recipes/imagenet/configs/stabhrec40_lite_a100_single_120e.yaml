model:
  name: stabhrec40_lite
  stem_channels: 64
  hidden_channels: 192
  steps: 12
  kernel_size: 3
  forget_bias: 1.0
  hidden_scale_init: -1.75
  delta_scale_init: -2.75
  aux_steps: 3
  aux_hidden_dim: 256
  main_dropout: 0.25
  aux_dropout: 0.15
  readout_mode: hc

data:
  train_root: /path/to/imagenet/train
  eval_root: /path/to/imagenet/val
  gold_root: ""
  image_size: 224
  eval_resize_size: 224
  # See 200e config notes — A100 80GB OOMs at batch=176, we use batch=128/grad_accum=1
  # for the Lite variant (no accumulation artifacts).
  per_gpu_batch_size: 128
  per_gpu_eval_batch_size: 256
  workers: 16
  persistent_workers: true
  prefetch_factor: 4
  pin_memory: true
  drop_last_train: true
  train_limit: null
  eval_limit: null
  gold_limit: null

train:
  # Lite is trained for the full 120-epoch schedule from scratch, mirroring
  # the dense v0.3.0 final-phase recipe (epochs 0-50 phase-1, 50-70 phase-2 lift,
  # 70-120 phase-3 flatter cosine) condensed into a single end-to-end 120e run.
  epochs: 120
  grad_accum_steps: 1
  gradient_clip_norm: 5.0
  use_amp: true
  benchmark: true
  channels_last: true
  eval_on_main_rank_only: false
  label_smoothing: 0.05
  mixup_alpha: 0.2
  mixup_prob: 0.5
  ema_decay: 0.999
  warmup_epochs: 5
  aux_weight: 0.2
  aux_weight_final: 0.05

optimizer:
  lr: 0.08
  weight_decay: 0.0001
  momentum: 0.9

logging:
  progress_every_batches: 200
  progress_every_samples: 0
  jsonl_filename: progress.jsonl

checkpointing:
  output_dir: runs/stabhrec40_lite_a100_single_120e
  checkpoint_prefix: stabhrec40_lite_a100_single_120e
  save_every_epoch: true
  save_best: true
  save_best_gold: false
  resume_from: auto

runtime:
  seed: 42
  device: cuda:0
  ddp_backend: nccl
  ddp_timeout_minutes: 60
  tf32: true
