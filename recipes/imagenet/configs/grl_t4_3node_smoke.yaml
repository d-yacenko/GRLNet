model:
  name: grl_base
  track_length: 10

data:
  train_root: /data/imagenet/train
  eval_root: /data/imagenet/val
  image_size: 224
  center_crop: true
  per_gpu_batch_size: 4
  workers: 6
  persistent_workers: true
  prefetch_factor: 2
  pin_memory: true
  drop_last_train: true

train:
  epochs: 5
  grad_accum_steps: 1
  train_gold_prob: 0.5
  use_amp: true
  benchmark: true
  eval_on_main_rank_only: true

optimizer:
  lr: 0.001
  weight_decay: 0.01
  bias_weight_decay: 0.0

scheduler:
  factor: 0.7
  patience: 9
  start_epoch: 15
  window_size: 70
  min_lr: 0.0001
  mode: min

logging:
  progress_every_batches: 25
  progress_every_samples: 0
  jsonl_filename: progress.jsonl
  log_json: true

checkpointing:
  output_dir: runs/grl_imagenet_t4_3node_smoke
  checkpoint_prefix: grl_t4_3node_smoke
  save_every_epoch: true
  save_best: true
  resume_from: auto

runtime:
  seed: 42
  device: cuda
  ddp_backend: nccl
  tf32: true
